<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Merch | Lüdtwig Schmüdy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200">

    <!-- Header & Navigation -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-gray-900 bg-opacity-80 backdrop-blur-sm shadow-lg">
        <nav class="container mx-auto flex flex-col sm:flex-row items-center justify-between p-4">
            <!-- Updated Logo -->
            <a href="index.html#home" class="text-3xl font-bold tracking-tight text-white transition-transform hover:scale-105">
                <svg class="h-12 w-12" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
                    <rect x="0" y="0" width="100" height="100" rx="15" fill="#2D3748"/>
                    <path d="M 25 35 L 25 65 L 50 65 M 50 65 L 50 35 L 75 35 L 75 65" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
                    <path d="M 25 25 Q 50 15, 75 25" stroke="#4299E1" stroke-width="4" fill="none" class="animate-pulse"/>
                    <path d="M 50 35 H 75 V 65 H 50" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
                </svg>
            </a>
            <div class="mt-4 sm:mt-0 flex flex-wrap justify-center sm:space-x-4">
                <a href="all-music.html" class="nav-link text-gray-400 hover:text-white px-3 py-2 rounded-lg font-medium transition-colors duration-300">Music</a>
                <a href="all-merch.html" class="nav-link text-gray-400 hover:text-white px-3 py-2 rounded-lg font-medium transition-colors duration-300">Shop</a>
                <a href="blog.html" class="nav-link text-gray-400 hover:text-white px-3 py-2 rounded-lg font-medium transition-colors duration-300">Blog</a>
                <a href="index.html#contact" class="nav-link text-gray-400 hover:text-white px-3 py-2 rounded-lg font-medium transition-colors duration-300">Contact</a>
            </div>
        </nav>
    </header>

    <main class="pt-24 min-h-screen">
        <section class="py-16">
            <div class="container mx-auto text-center px-4">
                <h1 class="text-4xl md:text-6xl font-bold mb-12">All Merchandise</h1>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                    <!-- Product 1 -->
                    <div class="bg-gray-800 rounded-xl shadow-lg p-6 transform hover:scale-105 transition-transform duration-300">
                        <img src="https://placehold.co/400x400/4a5568/e2e8f0?text=T-Shirt" alt="Merch T-shirt" class="w-full h-auto rounded-xl mb-4">
                        <h3 class="text-xl font-semibold mb-2">"Void" Tour T-Shirt</h3>
                        <p class="text-lg font-bold text-blue-400 mb-4">$25.00</p>
                        <button class="buy-btn bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded-full font-semibold">Buy Now</button>
                    </div>
                    <!-- Product 2 -->
                    <div class="bg-gray-800 rounded-xl shadow-lg p-6 transform hover:scale-105 transition-transform duration-300">
                        <img src="https://placehold.co/400x400/718096/f7fafc?text=Vinyl+LP" alt="Vinyl LP" class="w-full h-auto rounded-xl mb-4">
                        <h3 class="text-xl font-semibold mb-2">"Echoes of the Void" Vinyl</h3>
                        <p class="text-lg font-bold text-blue-400 mb-4">$30.00</p>
                        <button class="buy-btn bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded-full font-semibold">Buy Now</button>
                    </div>
                    <!-- Product 3 -->
                    <div class="bg-gray-800 rounded-xl shadow-lg p-6 transform hover:scale-105 transition-transform duration-300">
                        <img src="https://placehold.co/400x400/2d3748/cbd5e0?text=CD" alt="CD" class="w-full h-auto rounded-xl mb-4">
                        <h3 class="text-xl font-semibold mb-2">"Midnight Serenade" CD</h3>
                        <p class="text-lg font-bold text-blue-400 mb-4">$15.00</p>
                        <button class="buy-btn bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded-full font-semibold">Buy Now</button>
                    </div>
                     <!-- Product 4 -->
                    <div class="bg-gray-800 rounded-xl shadow-lg p-6 transform hover:scale-105 transition-transform duration-300">
                        <img src="https://placehold.co/400x400/4a5568/e2e8f0?text=Hoodie" alt="Merch Hoodie" class="w-full h-auto rounded-xl mb-4">
                        <h3 class="text-xl font-semibold mb-2">"Galactic" Hoodie</h3>
                        <p class="text-lg font-bold text-blue-400 mb-4">$45.00</p>
                        <button class="buy-btn bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded-full font-semibold">Buy Now</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-center py-8">
        <p class="text-gray-400 text-sm">&copy; 2023 Lüdtwig Schmüdy. All Rights Reserved.</p>
    </footer>
</body>
</html>
