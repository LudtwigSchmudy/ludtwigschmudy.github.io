<section class="fixed inset-0 background-1 top-[6rem]!">
    <div class="bg-black/40 fixed inset-0 flex flex-col justify-center items-center top-[8rem]!">
        <h1 class="text-3xl">Thank you!</h1>
        <p class="text-lg">This window will be closing in {{ seconds() }} {{"second"+"s".substring(0,seconds())}}</p>
        <button
            class="px-6 py-3 rounded-lg font-bold bg-blue-600 mt-4 cursor-pointer hover:bg-blue-800 transition-colors"
            (click)="closeWindow()"
        >
            Close Now
        </button>
    </div>
</section>
